<?xml version="1.0" encoding="UTF-8"?>
<!--
  ZenGuard Eye Animation SVG
  The CSS animation class "eye-animation" is applied by GTK4 to the
  <image> widget that wraps this SVG.  CSS keyframes (blink / breathe)
  animate the widget's opacity at the GTK4 layer, so no in-SVG animation
  is required — keeping the SVG purely declarative.
-->
<svg
  width="280"
  height="140"
  viewBox="0 0 280 140"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  role="img"
  aria-label="Blinking eye illustration"
>
  <!-- ── Outer glow (soft halo) ── -->
  <defs>
    <radialGradient id="iris-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6ab0ff"/>
      <stop offset="60%"  stop-color="#3a80d0"/>
      <stop offset="100%" stop-color="#1a4488"/>
    </radialGradient>
    <radialGradient id="pupil-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#09091a"/>
    </radialGradient>
    <filter id="outer-glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iris-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to eye shape so iris/pupil don't overflow -->
    <clipPath id="eye-clip">
      <path d="M 14 70 Q 140 4 266 70 Q 140 136 14 70 Z"/>
    </clipPath>
  </defs>

  <!-- ── Eye white ── -->
  <path
    d="M 14 70 Q 140 4 266 70 Q 140 136 14 70 Z"
    fill="#eef2ff"
    filter="url(#outer-glow)"
  />

  <!-- ── Iris ── -->
  <circle
    cx="140" cy="70" r="40"
    fill="url(#iris-grad)"
    filter="url(#iris-glow)"
    clip-path="url(#eye-clip)"
  />

  <!-- ── Pupil ── -->
  <circle
    cx="140" cy="70" r="22"
    fill="url(#pupil-grad)"
    clip-path="url(#eye-clip)"
  />

  <!-- ── Primary highlight (catch light) ── -->
  <circle
    cx="152" cy="57" r="9"
    fill="white"
    opacity="0.72"
    clip-path="url(#eye-clip)"
  />

  <!-- ── Secondary micro-highlight ── -->
  <circle
    cx="126" cy="78" r="4"
    fill="white"
    opacity="0.38"
    clip-path="url(#eye-clip)"
  />

  <!-- ── Iris detail ring ── -->
  <circle
    cx="140" cy="70" r="32"
    fill="none"
    stroke="#5090d8"
    stroke-width="1.5"
    opacity="0.40"
    clip-path="url(#eye-clip)"
  />

  <!-- ── Eyelid edge lines ── -->
  <path
    d="M 14 70 Q 140 4 266 70"
    fill="none"
    stroke="#9090b0"
    stroke-width="1.2"
    opacity="0.5"
  />
  <path
    d="M 14 70 Q 140 136 266 70"
    fill="none"
    stroke="#9090b0"
    stroke-width="1.2"
    opacity="0.5"
  />
</svg>
